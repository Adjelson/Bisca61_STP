<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Bisca 61 – Entrar</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap"
    rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html,
    body {
      width: 100%;
      min-height: 100vh;
      font-family: 'Lora', serif;
      background: radial-gradient(ellipse 90% 70% at 50% 20%, #2a7840 0%, #0b1a10 65%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px
    }

    :root {
      --gold: #d4a843;
      --gold2: #f0c96a;
      --cream: #f2e8ce;
      --g0: #0b1a10;
      --red: #c0392b
    }

    .card {
      background: rgba(0, 0, 0, .55);
      border: 1px solid rgba(212, 168, 67, .25);
      border-radius: 16px;
      padding: 40px 44px;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 22px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, .6);
    }

    h1 {
      font-family: 'Cinzel Decorative', serif;
      color: var(--gold);
      font-size: 2.2rem;
      text-align: center;
      letter-spacing: 5px;
      text-shadow: 0 0 30px rgba(212, 168, 67, .35)
    }

    .sub {
      text-align: center;
      color: var(--cream);
      opacity: .55;
      font-style: italic;
      font-size: .9rem;
      margin-top: -14px
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 7px
    }

    .field label {
      font-size: .72rem;
      letter-spacing: 1.5px;
      color: var(--gold2);
      text-transform: uppercase
    }

    .field input {
      background: rgba(255, 255, 255, .07);
      border: 1px solid rgba(212, 168, 67, .3);
      border-radius: 6px;
      padding: 11px 15px;
      color: var(--cream);
      font-family: 'Lora', serif;
      font-size: 1rem;
      outline: none;
      transition: border-color .15s
    }

    .field input:focus {
      border-color: var(--gold)
    }

    /* Avatar grid */
    .avatar-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px
    }

    .av {
      aspect-ratio: 1;
      border-radius: 50%;
      border: 3px solid rgba(255, 255, 255, .12);
      cursor: pointer;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      transition: border-color .15s, transform .12s;
      background: rgba(255, 255, 255, .06);
    }

    .av:hover {
      border-color: rgba(212, 168, 67, .5);
      transform: scale(1.05)
    }

    .av.sel {
      border-color: var(--gold);
      box-shadow: 0 0 0 2px var(--gold);
      transform: scale(1.07)
    }

    .btn {
      font-family: 'Cinzel Decorative', serif;
      font-size: .82rem;
      letter-spacing: 2px;
      padding: 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: linear-gradient(135deg, var(--gold), #a07828);
      color: var(--g0);
      box-shadow: 0 4px 18px rgba(212, 168, 67, .3);
      transition: transform .12s, box-shadow .12s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 26px rgba(212, 168, 67, .5)
    }

    .btn:active {
      transform: translateY(0)
    }

    .err {
      color: #e74c3c;
      font-size: .78rem;
      text-align: center;
      min-height: 18px
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>BISCA 61</h1>
    <p class="sub">Um capote de cada vez</p>
    <div class="field">
      <label>Seu nome de jogador</label>
      <input id="username" type="text" placeholder="Como te chamas?" maxlength="20"
        oninput="this.value=this.value.replace(/[^a-zA-Z0-9_\-\.]/g,'')">
    </div>
    <div class="field">
      <label>Escolhe o teu avatar</label>
      <div class="avatar-grid" id="av-grid"></div>
    </div>
    <div id="err" class="err"></div>
    <button class="btn" onclick="entrar()">ENTRAR NO JOGO</button>
  </div>
  <script>
    const AVATARS = ['🎩', '😎', '🤠', '👑', '🦁', '🐯', '⚡', '🃏'];
    let selAv = 1;
    const grid = document.getElementById('av-grid');
    AVATARS.forEach((e, i) => {
      const d = document.createElement('div');
      d.className = 'av' + (i === 0 ? ' sel' : '');
      d.textContent = e;
      d.onclick = () => { selAv = i + 1; document.querySelectorAll('.av').forEach((a, j) => a.classList.toggle('sel', j === i)); };
      grid.appendChild(d);
    });
    // guardar avatar seleccionado ao clicar
    document.querySelectorAll('.av')[0].classList.add('sel');

    async function entrar() {
      const name = document.getElementById('username').value.trim();
      if (!name || name.length < 2) { setErr('Nome deve ter pelo menos 2 caracteres'); return; }
      const res = await call('login', { username: name, avatar: selAv });
      if (res.erro) { setErr(res.erro); return; }
      localStorage.setItem('b61_token', res.token);
      localStorage.setItem('b61_user', JSON.stringify(res.user));
      window.location.href = 'lobby.html';
    }
    async function call(action, data) {
      try {
        const r = await fetch('./api.php', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action, ...data }) });
        return await r.json();
      } catch (e) { return { erro: 'Sem ligação ao servidor' }; }
    }
    function setErr(m) { document.getElementById('err').textContent = m || ''; }
  </script>
</body>

</html>
