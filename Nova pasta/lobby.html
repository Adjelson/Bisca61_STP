<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Bisca 61 – Lobby</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap"
    rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html,
    body {
      width: 100%;
      min-height: 100vh;
      font-family: 'Lora', serif;
      background: radial-gradient(ellipse 90% 60% at 50% 0%, #2a6c3a 0%, #0b1a10 60%);
      color: #f2e8ce;
      padding: 20px
    }

    :root {
      --gold: #d4a843;
      --gold2: #f0c96a;
      --cream: #f2e8ce;
      --g0: #0b1a10
    }

    /* header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 820px;
      margin: 0 auto 28px
    }

    .logo {
      font-family: 'Cinzel Decorative', serif;
      color: var(--gold);
      font-size: 1.5rem;
      letter-spacing: 4px
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: .85rem
    }

    .user-av {
      font-size: 1.8rem;
      line-height: 1
    }

    .user-name {
      color: var(--gold2);
      font-weight: 600
    }

    .user-pts {
      color: var(--cream);
      opacity: .6;
      font-size: .75rem
    }

    .btn-out {
      background: transparent;
      border: 1px solid rgba(212, 168, 67, .4);
      color: var(--gold);
      padding: 5px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'Lora', serif;
      font-size: .78rem;
      transition: background .12s
    }

    .btn-out:hover {
      background: rgba(212, 168, 67, .1)
    }

    /* main layout */
    main {
      max-width: 820px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px
    }

    @media(max-width:600px) {
      main {
        grid-template-columns: 1fr
      }
    }

    .panel {
      background: rgba(0, 0, 0, .5);
      border: 1px solid rgba(212, 168, 67, .2);
      border-radius: 14px;
      padding: 28px 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .panel h2 {
      font-family: 'Cinzel Decorative', serif;
      color: var(--gold);
      font-size: 1rem;
      letter-spacing: 2px
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px
    }

    .field label {
      font-size: .68rem;
      letter-spacing: 1.2px;
      color: var(--gold2);
      text-transform: uppercase
    }

    .field input {
      background: rgba(255, 255, 255, .07);
      border: 1px solid rgba(212, 168, 67, .25);
      border-radius: 5px;
      padding: 10px 13px;
      color: var(--cream);
      font-family: 'Lora', serif;
      font-size: .95rem;
      outline: none;
      transition: border-color .14s;
    }

    .field input:focus {
      border-color: var(--gold)
    }

    .mode-row {
      display: flex;
      gap: 10px
    }

    .mbtn {
      flex: 1;
      padding: 10px;
      border: 1px solid rgba(212, 168, 67, .25);
      border-radius: 6px;
      background: transparent;
      color: var(--cream);
      cursor: pointer;
      font-family: 'Lora';
      font-size: .82rem;
      text-align: center;
      transition: all .14s;
    }

    .mbtn.on {
      border-color: var(--gold);
      background: rgba(212, 168, 67, .14);
      color: var(--gold)
    }

    .btn {
      font-family: 'Cinzel Decorative', serif;
      font-size: .78rem;
      letter-spacing: 2px;
      padding: 12px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background: linear-gradient(135deg, var(--gold), #a07828);
      color: var(--g0);
      box-shadow: 0 4px 14px rgba(212, 168, 67, .25);
      transition: transform .12s, box-shadow .12s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 22px rgba(212, 168, 67, .45)
    }

    .btn:active {
      transform: translateY(0)
    }

    .err {
      color: #e74c3c;
      font-size: .75rem;
      min-height: 16px;
      text-align: center
    }

    .info {
      color: var(--cream);
      opacity: .55;
      font-size: .78rem;
      text-align: center;
      line-height: 1.5
    }

    /* waiting box */
    #wait-panel {
      display: none
    }

    .code-display {
      background: rgba(212, 168, 67, .08);
      border: 2px dashed rgba(212, 168, 67, .3);
      border-radius: 10px;
      padding: 18px;
      text-align: center;
    }

    .code-big {
      font-family: 'Cinzel Decorative', serif;
      font-size: 2.6rem;
      color: var(--gold);
      letter-spacing: 10px
    }

    .code-hint {
      font-size: .68rem;
      color: var(--cream);
      opacity: .5;
      margin-top: 4px;
      cursor: pointer
    }

    .code-hint:hover {
      opacity: .85
    }

    .plist {
      display: flex;
      flex-direction: column;
      gap: 7px
    }

    .pslot {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 7px;
      background: rgba(255, 255, 255, .05);
      font-size: .85rem;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, .15);
      flex-shrink: 0
    }

    .dot.on {
      background: #27ae60
    }

    .badge {
      font-size: .55rem;
      padding: 2px 7px;
      border-radius: 10px;
      letter-spacing: 1px
    }

    .ba {
      background: rgba(39, 174, 96, .2);
      color: #5dce8e
    }

    .bb {
      background: rgba(52, 152, 219, .2);
      color: #7fb3d3
    }

    .by {
      background: rgba(212, 168, 67, .25);
      color: var(--gold)
    }

    .av-sm {
      font-size: 1.3rem
    }

    #start-btn {
      display: none
    }

    .spinner {
      width: 30px;
      height: 30px;
      border: 3px solid rgba(212, 168, 67, .18);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="logo">BISCA 61</div>
    <div class="user-info">
      <div class="user-av" id="h-av">🎩</div>
      <div>
        <div class="user-name" id="h-name">–</div>
        <div class="user-pts" id="h-pts">0 pts</div>
      </div>
      <button class="btn-out" onclick="sair()">Sair</button>
    </div>
  </header>

  <main>
    <!-- CRIAR -->
    <div class="panel" id="create-panel">
      <h2>Criar Sala</h2>
      <div class="field">
        <label>Modo</label>
        <div class="mode-row">
          <button class="mbtn on" id="cm2" onclick="setCreateMode(2)">2 Jogadores<br><small
              style="opacity:.6;font-size:.8em">Individual</small></button>
          <button class="mbtn" id="cm4" onclick="setCreateMode(4)">4 Jogadores<br><small
              style="opacity:.6;font-size:.8em">Duplas</small></button>
        </div>
      </div>
      <p class="info" id="mode-info">Modo individual — cada um joga por si</p>
      <div id="cr-err" class="err"></div>
      <button class="btn" onclick="criarSala()">Criar Sala</button>
    </div>

    <!-- ENTRAR -->
    <div class="panel" id="join-panel">
      <h2>Entrar com Código</h2>
      <div class="field">
        <label>Código da Sala</label>
        <input id="jn-cod" type="text" placeholder="Ex: B7K2" maxlength="6"
          style="text-transform:uppercase;letter-spacing:6px;font-size:1.4rem;text-align:center"
          oninput="this.value=this.value.toUpperCase()">
      </div>
      <div id="jn-err" class="err"></div>
      <button class="btn" onclick="entrarSala()">Entrar na Sala</button>
    </div>

    <!-- AGUARDANDO (full width) -->
    <div class="panel" id="wait-panel" style="grid-column:1/-1">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <h2 id="wt-title">Aguardando jogadores…</h2>
        <button class="btn-out" onclick="sairSala()">Cancelar</button>
      </div>
      <div class="spinner" id="wt-spin"></div>
      <div class="code-display">
        <div class="code-big" id="wt-code">----</div>
        <div class="code-hint" onclick="copiar()">📋 Clique para copiar e partilhar</div>
      </div>
      <div class="plist" id="wt-players"></div>
      <button class="btn" id="start-btn" onclick="hostIniciar()">Iniciar Jogo</button>
    </div>
  </main>

  <script>
    const AVATARS = ['🎩', '😎', '🤠', '👑', '🦁', '🐯', '⚡', '🃏'];
    let token = '', user = null, roomCode = '', mySlot = 0, numPlayers = 2, isHost = false, pollT = null;

    // ── Auth ──
    function init() {
      token = localStorage.getItem('b61_token') || '';
      const u = localStorage.getItem('b61_user');
      if (!token || !u) { window.location.href = 'index.html'; return; }
      user = JSON.parse(u);
      document.getElementById('h-av').textContent = AVATARS[user.avatar - 1] || '🎩';
      document.getElementById('h-name').textContent = user.username;
      document.getElementById('h-pts').textContent = (user.match_pts || 0) + ' pts';
    }
    function sair() { localStorage.clear(); window.location.href = 'index.html'; }

    // ── Modo ──
    let createMode = 2;
    function setCreateMode(n) {
      createMode = n;
      document.getElementById('cm2').classList.toggle('on', n === 2);
      document.getElementById('cm4').classList.toggle('on', n === 4);
      document.getElementById('mode-info').textContent = n === 2
        ? 'Modo individual — cada um joga por si'
        : 'Modo duplas — equipa 0+2 vs equipa 1+3';
    }

    // ── Criar sala ──
    async function criarSala() {
      const res = await api('criar_sala', { token, num_jogadores: createMode });
      if (res.erro) { setErr('cr-err', res.erro); return; }
      roomCode = res.codigo; mySlot = 0; numPlayers = createMode; isHost = true;
      mostrarWait();
    }

    // ── Entrar ──
    async function entrarSala() {
      const cod = document.getElementById('jn-cod').value.trim().toUpperCase();
      if (!cod) { setErr('jn-err', 'Insira o código'); return; }
      const res = await api('entrar_sala', { token, codigo: cod });
      if (res.erro) { setErr('jn-err', res.erro); return; }
      roomCode = res.codigo; mySlot = res.slot; numPlayers = res.num_jogadores; isHost = false;
      mostrarWait();
    }

    // ── Wait ──
    function mostrarWait() {
      document.getElementById('create-panel').style.display = 'none';
      document.getElementById('join-panel').style.display = 'none';
      document.getElementById('wait-panel').style.display = 'flex';
      document.getElementById('wt-code').textContent = roomCode;
      pollT = setInterval(pollWait, 1600);
    }
    function copiar() { navigator.clipboard.writeText(roomCode).then(() => alert('Código ' + roomCode + ' copiado!')); }

    async function pollWait() {
      const res = await api('estado_sala', { codigo: roomCode }, 'GET');
      if (!res || res.erro) return;
      const jogs = res.jogadores;
      const numMax = parseInt(res.sala.num_jogadores);
      // render players
      const el = document.getElementById('wt-players');
      el.innerHTML = Array.from({ length: numMax }, (_, i) => {
        const p = jogs.find(x => x.slot === i);
        const team = numMax === 4 ? `<span class="badge ${i % 2 === 0 ? 'ba' : 'bb'}">${i % 2 === 0 ? 'A' : 'B'}</span>` : '';
        const you = p && p.user_id == user.id ? '<span class="badge by">VOCÊ</span>' : '';
        return `<div class="pslot">
      <div class="dot ${p ? 'on' : ''}"></div>
      <span class="av-sm">${p ? AVATARS[p.avatar - 1] || '🎩' : ''}</span>
      <span style="flex:1">${p ? p.username : 'Aguardando...'}</span>
      ${p ? team : ''} ${you}
    </div>`;
      }).join('');
      document.getElementById('start-btn').style.display = (isHost && jogs.length >= numMax) ? 'block' : 'none';
      document.getElementById('wt-title').textContent = jogs.length + '/' + numMax + ' jogadores';
      // jogo iniciado?
      if (res.sala.estado === 'jogando' && res.jogo) {
        clearInterval(pollT);
        sessionStorage.setItem('b61_game', JSON.stringify({ roomCode, mySlot, numPlayers, token, isHost }));
        window.location.href = 'game.html';
      }
    }

    async function hostIniciar() {
      const res = await api('estado_sala', { codigo: roomCode }, 'GET');
      if (!res || !res.jogadores) return;
      if (res.jogadores.length < parseInt(res.sala.num_jogadores)) { alert('Ainda faltam jogadores!'); return; }
      const jogadores = res.jogadores.map(j => ({ id: j.user_id, name: j.username, avatar: j.avatar, slot: j.slot }));
      const gs = construirEstado(parseInt(res.sala.num_jogadores), jogadores);
      const r = await api('iniciar_jogo', { token, codigo: roomCode, estado: gs });
      if (r.erro) alert(r.erro);
    }

    async function sairSala() {
      clearInterval(pollT);
      await api('sair_sala', { token, codigo: roomCode });
      window.location.reload();
    }

    // ── Game state builder ──
    function construirEstado(n, players) {
      const deck = embaralhar(criarBaralho());
      const hands = Array.from({ length: n }, () => []);
      for (let i = 0; i < 5; i++)for (let p = 0; p < n; p++)hands[p].push(deck.pop());
      const trumpCard = deck[deck.length - 1];
      return {
        deck, hands, trumpSuit: trumpCard.s, trumpCard, table: [], leadSlot: 0, currentSlot: 0,
        roundPts: Array(n).fill(0), matchPts: Array(n).fill(0), round: 1, phase: 'play',
        numPlayers: n, players, done: false, log: '', bolo: false
      };
    }
    const SUITS = ['S', 'H', 'D', 'C'];
    const RANKS = ['A', '5', 'K', 'J', 'Q', '7', '6', '4', '3', '2'];
    const PTS = { A: 11, 5: 10, K: 4, J: 3, Q: 2, 7: 0, 6: 0, 4: 0, 3: 0, 2: 0 };
    function criarBaralho() { return SUITS.flatMap(s => RANKS.map(r => ({ s, r, p: PTS[r] }))); }
    function embaralhar(a) { for (let i = a.length - 1; i > 0; i--) { const j = 0 | Math.random() * (i + 1);[a[i], a[j]] = [a[j], a[i]]; } return a; }

    // ── API ──
    async function api(action, data = {}, method = 'POST') {
      try {
        if (method === 'GET') {
          const r = await fetch('api.php?action=' + action + '&' + new URLSearchParams(data));
          return await r.json();
        }
        const r = await fetch('api.php', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action, ...data }) });
        return await r.json();
      } catch (e) { return { erro: 'Erro de ligação' }; }
    }
    function setErr(id, m) { document.getElementById(id).textContent = m || ''; }

    init();
  </script>
</body>

</html>
